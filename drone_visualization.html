<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Sanjay Mk2 - Hexagonal Coverage</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #111827; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Generate hexagon vertices
        const generateHexagonVertices = (centerX, centerY, radius) => {
            const vertices = [];
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i - Math.PI / 2;
                vertices.push({
                    x: centerX + radius * Math.cos(angle),
                    y: centerY + radius * Math.sin(angle)
                });
            }
            return vertices;
        };

        const HEX_CENTER = { x: 0, y: 0 };
        const HEX_RADIUS = 50;
        const CRUISE_ALTITUDE = 25;
        const HEX_VERTICES = generateHexagonVertices(HEX_CENTER.x, HEX_CENTER.y, HEX_RADIUS);
        const DRONE_HOME_VERTICES = [0, 2, 4];

        const generateDronePath = (droneIndex) => {
            const homeVertex = DRONE_HOME_VERTICES[droneIndex];
            const v = HEX_VERTICES;
            const c = HEX_CENTER;
            const nextVertex = (homeVertex + 1) % 6;
            const prevVertex = (homeVertex + 5) % 6;

            return [
                { ...v[homeVertex], z: 0.5, action: 'takeoff' },
                { ...v[homeVertex], z: CRUISE_ALTITUDE, action: 'climb' },
                { ...c, z: CRUISE_ALTITUDE, action: 'navigate' },
                { ...v[nextVertex], z: CRUISE_ALTITUDE, action: 'navigate' },
                { ...v[homeVertex], z: CRUISE_ALTITUDE, action: 'navigate' },
                { ...v[prevVertex], z: CRUISE_ALTITUDE, action: 'navigate' },
                { ...c, z: CRUISE_ALTITUDE, action: 'navigate' },
                { ...v[homeVertex], z: CRUISE_ALTITUDE, action: 'complete' },
                { ...v[homeVertex], z: 0.5, action: 'land' }
            ];
        };

        const droneColors = ['#3b82f6', '#10b981', '#f59e0b'];

        const DroneSimulationViz = () => {
            const [isRunning, setIsRunning] = useState(false);
            const [time, setTime] = useState(0);
            const [selectedDrone, setSelectedDrone] = useState(0);
            const [viewMode, setViewMode] = useState('topdown');
            const [messages, setMessages] = useState([]);
            const [allTasksComplete, setAllTasksComplete] = useState(false);
            const [landingInitiated, setLandingInitiated] = useState(false);

            const [drones, setDrones] = useState([
                {
                    id: 0, type: 'ALPHA', name: 'Alpha-1',
                    position: { ...HEX_VERTICES[0], z: 0.5 },
                    velocity: { x: 0, y: 0, z: 0 },
                    mode: 'IDLE', battery: 100,
                    homeVertex: 0, currentWaypoint: 0,
                    path: generateDronePath(0),
                    trail: [], color: droneColors[0],
                    motorSpeeds: [0, 0, 0, 0],
                    taskComplete: false
                },
                {
                    id: 1, type: 'ALPHA', name: 'Alpha-2',
                    position: { ...HEX_VERTICES[2], z: 0.5 },
                    velocity: { x: 0, y: 0, z: 0 },
                    mode: 'IDLE', battery: 100,
                    homeVertex: 2, currentWaypoint: 0,
                    path: generateDronePath(1),
                    trail: [], color: droneColors[1],
                    motorSpeeds: [0, 0, 0, 0],
                    taskComplete: false
                },
                {
                    id: 2, type: 'ALPHA', name: 'Alpha-3',
                    position: { ...HEX_VERTICES[4], z: 0.5 },
                    velocity: { x: 0, y: 0, z: 0 },
                    mode: 'IDLE', battery: 100,
                    homeVertex: 4, currentWaypoint: 0,
                    path: generateDronePath(2),
                    trail: [], color: droneColors[2],
                    motorSpeeds: [0, 0, 0, 0],
                    taskComplete: false
                }
            ]);

            const addMessage = (from, to, content, type = 'info') => {
                setMessages(prev => [...prev.slice(-8), {
                    id: Date.now() + Math.random(),
                    time: time.toFixed(1),
                    from, to, content, type
                }]);
            };

            useEffect(() => {
                if (!isRunning) return;

                const interval = setInterval(() => {
                    setTime(t => t + 0.02);

                    setDrones(prevDrones => {
                        const newDrones = prevDrones.map((drone) => {
                            let newDrone = { ...drone };
                            const target = drone.path[drone.currentWaypoint];
                            if (!target) return newDrone;

                            if (drone.mode === 'IDLE' && isRunning) {
                                newDrone.mode = 'ARMING';
                            } else if (drone.mode === 'ARMING') {
                                newDrone.mode = 'ARMED';
                                newDrone.motorSpeeds = [1200, 1200, 1200, 1200];
                            } else if (drone.mode === 'ARMED') {
                                newDrone.mode = 'TAKING_OFF';
                                addMessage(drone.name, 'GCS', `Taking off from V${drone.homeVertex}`, 'status');
                            } else if (drone.mode === 'TAKING_OFF' || drone.mode === 'NAVIGATING') {
                                const dx = target.x - drone.position.x;
                                const dy = target.y - drone.position.y;
                                const dz = target.z - drone.position.z;
                                const distance = Math.sqrt(dx*dx + dy*dy + dz*dz);

                                if (distance < 1.5) {
                                    if (drone.currentWaypoint < drone.path.length - 1) {
                                        newDrone.currentWaypoint = drone.currentWaypoint + 1;
                                        const nextTarget = drone.path[newDrone.currentWaypoint];

                                        if (nextTarget.action === 'complete') {
                                            newDrone.taskComplete = true;
                                            newDrone.mode = 'HOVERING';
                                            addMessage(drone.name, 'SWARM', `Section complete`, 'success');
                                        } else if (nextTarget.action === 'land') {
                                            newDrone.mode = 'LANDING';
                                        } else {
                                            newDrone.mode = 'NAVIGATING';
                                        }
                                    }
                                } else {
                                    const speed = drone.mode === 'TAKING_OFF' ? 4 : 8;
                                    const vx = (dx / distance) * speed * 0.02;
                                    const vy = (dy / distance) * speed * 0.02;
                                    const vz = (dz / distance) * speed * 0.02;

                                    newDrone.position = {
                                        x: drone.position.x + vx,
                                        y: drone.position.y + vy,
                                        z: drone.position.z + vz
                                    };
                                    newDrone.velocity = { x: vx/0.02, y: vy/0.02, z: vz/0.02 };
                                    newDrone.motorSpeeds = [3000, 3000, 3000, 3000];
                                    newDrone.trail = [...drone.trail.slice(-300), { ...newDrone.position }];
                                }
                            } else if (drone.mode === 'HOVERING') {
                                newDrone.motorSpeeds = [2800, 2800, 2800, 2800];
                            } else if (drone.mode === 'LANDING') {
                                if (drone.position.z > 0.6) {
                                    newDrone.position.z -= 0.08;
                                    newDrone.motorSpeeds = [2000, 2000, 2000, 2000];
                                } else {
                                    newDrone.position.z = 0.5;
                                    newDrone.mode = 'LANDED';
                                    newDrone.motorSpeeds = [0, 0, 0, 0];
                                    addMessage(drone.name, 'GCS', `Landed at V${drone.homeVertex}`, 'success');
                                }
                            } else if (drone.mode === 'LANDED') {
                                newDrone.mode = 'IDLE';
                            }

                            if (drone.mode !== 'IDLE' && drone.mode !== 'LANDED') {
                                newDrone.battery = Math.max(0, drone.battery - 0.003);
                            }

                            return newDrone;
                        });

                        const allComplete = newDrones.every(d => d.taskComplete);
                        if (allComplete && !allTasksComplete) {
                            setAllTasksComplete(true);
                            setTimeout(() => addMessage('Alpha-1', 'ALL', 'Section A done. Status?', 'comm'), 100);
                            setTimeout(() => addMessage('Alpha-2', 'ALL', 'Section B done. RTL ready.', 'comm'), 500);
                            setTimeout(() => addMessage('Alpha-3', 'ALL', 'Section C done. Confirmed.', 'comm'), 900);
                            setTimeout(() => {
                                addMessage('SWARM', 'ALL', 'Coordinated landing initiated', 'success');
                                setLandingInitiated(true);
                            }, 1300);
                        }

                        if (landingInitiated) {
                            return newDrones.map(d => {
                                if (d.mode === 'HOVERING' && d.taskComplete) {
                                    return { ...d, currentWaypoint: d.path.length - 1, mode: 'LANDING' };
                                }
                                return d;
                            });
                        }

                        return newDrones;
                    });
                }, 20);

                return () => clearInterval(interval);
            }, [isRunning, allTasksComplete, landingInitiated, time]);

            const reset = () => {
                setIsRunning(false);
                setTime(0);
                setMessages([]);
                setAllTasksComplete(false);
                setLandingInitiated(false);
                setDrones(drones.map((d, idx) => ({
                    ...d,
                    position: { ...HEX_VERTICES[DRONE_HOME_VERTICES[idx]], z: 0.5 },
                    velocity: { x: 0, y: 0, z: 0 },
                    mode: 'IDLE', battery: 100,
                    currentWaypoint: 0,
                    path: generateDronePath(idx),
                    trail: [], motorSpeeds: [0, 0, 0, 0],
                    taskComplete: false
                })));
            };

            const getModeColor = (mode) => ({
                'IDLE': '#6b7280', 'ARMING': '#f59e0b', 'ARMED': '#f59e0b',
                'TAKING_OFF': '#3b82f6', 'HOVERING': '#10b981', 'NAVIGATING': '#8b5cf6',
                'LANDING': '#f97316', 'LANDED': '#6b7280', 'EMERGENCY': '#ef4444'
            }[mode] || '#6b7280');

            const selectedDroneData = drones[selectedDrone];

            return (
                <div style={{ minHeight: '100vh', background: '#111827', color: 'white', padding: '16px' }}>
                    {/* Header */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px', flexWrap: 'wrap', gap: '12px' }}>
                        <div>
                            <h1 style={{ fontSize: '24px', fontWeight: 'bold', color: '#60a5fa', margin: 0 }}>Project Sanjay Mk2</h1>
                            <p style={{ fontSize: '14px', color: '#9ca3af', margin: '4px 0 0 0' }}>Hexagonal Coverage - 3 Alpha Drones</p>
                        </div>
                        <div style={{ display: 'flex', gap: '8px' }}>
                            <button
                                onClick={() => setIsRunning(!isRunning)}
                                style={{
                                    padding: '10px 20px', borderRadius: '8px', border: 'none',
                                    background: isRunning ? '#ca8a04' : '#16a34a',
                                    color: 'white', fontWeight: '600', cursor: 'pointer',
                                    display: 'flex', alignItems: 'center', gap: '8px'
                                }}
                            >
                                {isRunning ? '⏸ Pause' : '▶ Start Mission'}
                            </button>
                            <button
                                onClick={reset}
                                style={{
                                    padding: '10px 20px', borderRadius: '8px', border: 'none',
                                    background: '#374151', color: 'white', cursor: 'pointer'
                                }}
                            >
                                ↺ Reset
                            </button>
                        </div>
                    </div>

                    {/* View Tabs */}
                    <div style={{ display: 'flex', gap: '8px', marginBottom: '12px' }}>
                        {['topdown', '3d', 'stateMachine'].map(mode => (
                            <button
                                key={mode}
                                onClick={() => setViewMode(mode)}
                                style={{
                                    padding: '8px 16px', borderRadius: '8px', border: 'none',
                                    background: viewMode === mode ? '#2563eb' : '#374151',
                                    color: 'white', cursor: 'pointer', fontSize: '14px'
                                }}
                            >
                                {mode === 'topdown' ? 'Top Down' : mode === '3d' ? '3D View' : 'State Machine'}
                            </button>
                        ))}
                    </div>

                    {/* Main Content */}
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: '16px' }}>
                        {/* Visualization Panel */}
                        <div style={{ background: '#1f2937', borderRadius: '12px', padding: '16px' }}>
                            {viewMode === 'stateMachine' ? (
                                <StateMachine currentMode={selectedDroneData.mode} getModeColor={getModeColor} />
                            ) : (
                                <HexagonView
                                    drones={drones}
                                    selectedDrone={selectedDrone}
                                    setSelectedDrone={setSelectedDrone}
                                    viewMode={viewMode}
                                    getModeColor={getModeColor}
                                />
                            )}
                        </div>

                        {/* Right Panel */}
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                            {/* Fleet Status */}
                            <div style={{ background: '#1f2937', borderRadius: '12px', padding: '12px' }}>
                                <h3 style={{ fontSize: '14px', fontWeight: '600', margin: '0 0 10px 0', color: '#60a5fa' }}>
                                    🛸 Alpha Fleet
                                </h3>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                    {drones.map((drone, idx) => (
                                        <button
                                            key={drone.id}
                                            onClick={() => setSelectedDrone(idx)}
                                            style={{
                                                padding: '10px', borderRadius: '8px', border: 'none',
                                                background: selectedDrone === idx ? '#2563eb' : '#374151',
                                                color: 'white', cursor: 'pointer', textAlign: 'left'
                                            }}
                                        >
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                    <div style={{ width: '10px', height: '10px', borderRadius: '50%', background: drone.color }} />
                                                    <span style={{ fontWeight: '500' }}>{drone.name}</span>
                                                    {drone.taskComplete && <span style={{ color: '#22c55e' }}>✓</span>}
                                                </div>
                                                <span style={{
                                                    fontSize: '11px', padding: '2px 8px', borderRadius: '4px',
                                                    background: getModeColor(drone.mode)
                                                }}>
                                                    {drone.mode}
                                                </span>
                                            </div>
                                            <div style={{ fontSize: '11px', color: '#9ca3af', marginTop: '4px' }}>
                                                Home: V{drone.homeVertex} | Alt: {drone.position.z.toFixed(1)}m | Batt: {drone.battery.toFixed(0)}%
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Telemetry */}
                            <div style={{ background: '#1f2937', borderRadius: '12px', padding: '12px' }}>
                                <h3 style={{ fontSize: '14px', fontWeight: '600', margin: '0 0 10px 0', color: '#22c55e' }}>
                                    📡 Telemetry - {selectedDroneData.name}
                                </h3>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px', fontSize: '12px' }}>
                                    <div style={{ background: '#374151', padding: '8px', borderRadius: '6px' }}>
                                        <div style={{ color: '#9ca3af' }}>Position</div>
                                        <div style={{ fontFamily: 'monospace' }}>
                                            ({selectedDroneData.position.x.toFixed(1)}, {selectedDroneData.position.y.toFixed(1)})
                                        </div>
                                    </div>
                                    <div style={{ background: '#374151', padding: '8px', borderRadius: '6px' }}>
                                        <div style={{ color: '#9ca3af' }}>Altitude</div>
                                        <div style={{ fontFamily: 'monospace' }}>{selectedDroneData.position.z.toFixed(1)} m</div>
                                    </div>
                                    <div style={{ background: '#374151', padding: '8px', borderRadius: '6px' }}>
                                        <div style={{ color: '#9ca3af' }}>Speed</div>
                                        <div style={{ fontFamily: 'monospace' }}>
                                            {Math.sqrt(selectedDroneData.velocity.x**2 + selectedDroneData.velocity.y**2 + selectedDroneData.velocity.z**2).toFixed(1)} m/s
                                        </div>
                                    </div>
                                    <div style={{ background: '#374151', padding: '8px', borderRadius: '6px' }}>
                                        <div style={{ color: '#9ca3af' }}>Battery</div>
                                        <div style={{ color: selectedDroneData.battery < 20 ? '#ef4444' : '#22c55e' }}>
                                            {selectedDroneData.battery.toFixed(1)}%
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Mission Status */}
                            <div style={{ background: '#1f2937', borderRadius: '12px', padding: '12px' }}>
                                <h3 style={{ fontSize: '14px', fontWeight: '600', margin: '0 0 10px 0', color: '#f59e0b' }}>
                                    🎯 Mission Status
                                </h3>
                                <div style={{ marginBottom: '8px' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', marginBottom: '4px' }}>
                                        <span>Coverage</span>
                                        <span>{Math.round(drones.filter(d => d.taskComplete).length / 3 * 100)}%</span>
                                    </div>
                                    <div style={{ background: '#374151', borderRadius: '4px', height: '8px' }}>
                                        <div style={{
                                            background: '#22c55e', borderRadius: '4px', height: '100%',
                                            width: `${drones.filter(d => d.taskComplete).length / 3 * 100}%`,
                                            transition: 'width 0.3s'
                                        }} />
                                    </div>
                                </div>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '4px' }}>
                                    {drones.map((d, i) => (
                                        <div key={d.id} style={{
                                            padding: '6px', borderRadius: '4px', textAlign: 'center',
                                            fontSize: '11px',
                                            background: d.taskComplete ? 'rgba(34,197,94,0.2)' : '#374151',
                                            color: d.taskComplete ? '#22c55e' : '#9ca3af',
                                            border: `1px solid ${d.taskComplete ? '#22c55e' : 'transparent'}`
                                        }}>
                                            Sec {['A', 'B', 'C'][i]} {d.taskComplete && '✓'}
                                        </div>
                                    ))}
                                </div>
                                <div style={{ fontSize: '11px', color: '#9ca3af', marginTop: '8px', textAlign: 'center' }}>
                                    {!allTasksComplete && drones.some(d => d.mode !== 'IDLE') && 'Coverage in progress...'}
                                    {allTasksComplete && !landingInitiated && 'Coordinating RTL...'}
                                    {landingInitiated && !drones.every(d => d.mode === 'IDLE') && 'Landing in progress...'}
                                    {drones.every(d => d.mode === 'IDLE') && time > 1 && '✅ Mission Complete!'}
                                </div>
                            </div>

                            {/* Communication Log */}
                            <div style={{ background: '#1f2937', borderRadius: '12px', padding: '12px', flex: 1, minHeight: '150px' }}>
                                <h3 style={{ fontSize: '14px', fontWeight: '600', margin: '0 0 10px 0', color: '#a855f7' }}>
                                    💬 Swarm Communication
                                </h3>
                                <div style={{ maxHeight: '140px', overflowY: 'auto', fontSize: '11px' }}>
                                    {messages.length === 0 ? (
                                        <div style={{ color: '#6b7280', fontStyle: 'italic' }}>Waiting for messages...</div>
                                    ) : (
                                        messages.map(msg => (
                                            <div key={msg.id} style={{
                                                padding: '6px 8px', marginBottom: '4px', borderRadius: '4px',
                                                background: msg.type === 'comm' ? 'rgba(168,85,247,0.15)' :
                                                           msg.type === 'success' ? 'rgba(34,197,94,0.15)' : 'rgba(55,65,81,0.5)',
                                                borderLeft: `3px solid ${msg.type === 'comm' ? '#a855f7' : msg.type === 'success' ? '#22c55e' : '#6b7280'}`
                                            }}>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', color: '#9ca3af' }}>
                                                    <span style={{ fontWeight: '600', color: 'white' }}>{msg.from}</span>
                                                    <span>→ {msg.to}</span>
                                                </div>
                                                <div style={{ color: '#d1d5db' }}>{msg.content}</div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Footer */}
                    <div style={{ marginTop: '16px', textAlign: 'center', fontSize: '12px', color: '#6b7280' }}>
                        Time: {time.toFixed(2)}s | Hexagon: {HEX_RADIUS}m radius | Cruise: {CRUISE_ALTITUDE}m | Ceiling: 65m
                    </div>
                </div>
            );
        };

        // Hexagon Visualization Component
        const HexagonView = ({ drones, selectedDrone, setSelectedDrone, viewMode, getModeColor }) => {
            const width = 600;
            const height = 420;
            const scale = 3.2;
            const centerX = width / 2;
            const centerY = height / 2;

            return (
                <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
                    {/* Background */}
                    <rect width={width} height={height} fill="#111827" />

                    {/* Grid */}
                    <defs>
                        <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
                            <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1f2937" strokeWidth="1"/>
                        </pattern>
                    </defs>
                    <rect width={width} height={height} fill="url(#grid)" />

                    {/* Hexagon fill by sections */}
                    {[0, 1, 2].map(i => {
                        const home = DRONE_HOME_VERTICES[i];
                        const next = (home + 1) % 6;
                        const prev = (home + 5) % 6;
                        const v = HEX_VERTICES;
                        return (
                            <g key={i}>
                                <polygon
                                    points={`${centerX},${centerY} ${centerX + v[home].x * scale},${centerY - v[home].y * scale} ${centerX + v[next].x * scale},${centerY - v[next].y * scale}`}
                                    fill={droneColors[i]}
                                    opacity="0.08"
                                />
                                <polygon
                                    points={`${centerX},${centerY} ${centerX + v[home].x * scale},${centerY - v[home].y * scale} ${centerX + v[prev].x * scale},${centerY - v[prev].y * scale}`}
                                    fill={droneColors[i]}
                                    opacity="0.08"
                                />
                            </g>
                        );
                    })}

                    {/* Hexagon outline */}
                    <polygon
                        points={HEX_VERTICES.map(v => `${centerX + v.x * scale},${centerY - v.y * scale}`).join(' ')}
                        fill="none"
                        stroke="#4b5563"
                        strokeWidth="2"
                    />

                    {/* Spokes to center */}
                    {HEX_VERTICES.map((v, i) => (
                        <line
                            key={i}
                            x1={centerX}
                            y1={centerY}
                            x2={centerX + v.x * scale}
                            y2={centerY - v.y * scale}
                            stroke="#374151"
                            strokeWidth="1"
                            strokeDasharray="4,4"
                        />
                    ))}

                    {/* Center point */}
                    <circle cx={centerX} cy={centerY} r="5" fill="#6b7280" />
                    <text x={centerX} y={centerY + 4} textAnchor="middle" fill="white" fontSize="8">C</text>

                    {/* Vertices */}
                    {HEX_VERTICES.map((v, idx) => {
                        const isHome = DRONE_HOME_VERTICES.includes(idx);
                        const droneIdx = DRONE_HOME_VERTICES.indexOf(idx);
                        const x = centerX + v.x * scale;
                        const y = centerY - v.y * scale;
                        return (
                            <g key={idx}>
                                <circle
                                    cx={x} cy={y}
                                    r={isHome ? 14 : 8}
                                    fill={isHome ? droneColors[droneIdx] : '#374151'}
                                    opacity={isHome ? 0.3 : 1}
                                    stroke={isHome ? droneColors[droneIdx] : '#4b5563'}
                                    strokeWidth="2"
                                />
                                <text x={x} y={y + 4} textAnchor="middle" fill="white" fontSize="10" fontWeight="bold">
                                    {idx}
                                </text>
                            </g>
                        );
                    })}

                    {/* Drone trails */}
                    {drones.map(drone => (
                        <polyline
                            key={`trail-${drone.id}`}
                            points={drone.trail.map(p => `${centerX + p.x * scale},${centerY - p.y * scale}`).join(' ')}
                            fill="none"
                            stroke={drone.color}
                            strokeWidth="2.5"
                            opacity="0.7"
                            strokeLinecap="round"
                            strokeLinejoin="round"
                        />
                    ))}

                    {/* Drones */}
                    {drones.map((drone, idx) => {
                        const x = centerX + drone.position.x * scale;
                        const y = centerY - drone.position.y * scale;
                        const size = selectedDrone === idx ? 16 : 12;
                        const isSelected = selectedDrone === idx;

                        return (
                            <g key={drone.id} onClick={() => setSelectedDrone(idx)} style={{ cursor: 'pointer' }}>
                                {/* Altitude indicator for 3D view */}
                                {viewMode === '3d' && drone.position.z > 1 && (
                                    <>
                                        <line
                                            x1={x} y1={y}
                                            x2={x} y2={y + drone.position.z * 1.8}
                                            stroke={drone.color}
                                            strokeWidth="1"
                                            strokeDasharray="3,3"
                                            opacity="0.5"
                                        />
                                        <ellipse
                                            cx={x} cy={y + drone.position.z * 1.8}
                                            rx="10" ry="5"
                                            fill={drone.color}
                                            opacity="0.2"
                                        />
                                    </>
                                )}

                                {/* Selection ring */}
                                {isSelected && (
                                    <circle cx={x} cy={y} r={size + 6} fill="none" stroke="white" strokeWidth="2" opacity="0.5" />
                                )}

                                {/* Drone body */}
                                <polygon
                                    points={`${x},${y-size} ${x+size},${y+size*0.6} ${x-size},${y+size*0.6}`}
                                    fill={drone.color}
                                    stroke={isSelected ? 'white' : 'rgba(0,0,0,0.3)'}
                                    strokeWidth={isSelected ? 2 : 1}
                                />

                                {/* Task complete badge */}
                                {drone.taskComplete && drone.mode === 'HOVERING' && (
                                    <circle cx={x + size} cy={y - size} r="6" fill="#22c55e" stroke="white" strokeWidth="1" />
                                )}

                                {/* Label */}
                                <rect x={x - 28} y={y - size - 22} width="56" height="16" rx="4" fill="rgba(0,0,0,0.7)" />
                                <text x={x} y={y - size - 10} textAnchor="middle" fill="white" fontSize="10" fontWeight="500">
                                    {drone.name} [{drone.position.z.toFixed(0)}m]
                                </text>
                            </g>
                        );
                    })}

                    {/* Legend */}
                    <g transform="translate(16, 16)">
                        <rect width="130" height="85" fill="rgba(17,24,39,0.9)" rx="6" stroke="#374151" />
                        <text x="10" y="18" fill="white" fontSize="11" fontWeight="bold">Coverage Sections</text>
                        {drones.map((d, i) => (
                            <g key={i} transform={`translate(10, ${30 + i * 18})`}>
                                <rect width="12" height="12" fill={d.color} rx="2" />
                                <text x="18" y="10" fill="white" fontSize="10">
                                    {d.name}: V{d.homeVertex} area
                                </text>
                            </g>
                        ))}
                    </g>

                    {/* Compass */}
                    <g transform={`translate(${width - 45}, 45)`}>
                        <circle r="28" fill="rgba(17,24,39,0.9)" stroke="#374151" />
                        <text y="-10" textAnchor="middle" fill="#ef4444" fontSize="12" fontWeight="bold">N</text>
                        <text x="12" y="4" textAnchor="middle" fill="white" fontSize="10">E</text>
                        <text y="18" textAnchor="middle" fill="white" fontSize="10">S</text>
                        <text x="-12" y="4" textAnchor="middle" fill="white" fontSize="10">W</text>
                    </g>

                    {/* Altitude Scale (3D view) */}
                    {viewMode === '3d' && (
                        <g transform={`translate(${width - 50}, 100)`}>
                            <rect x="-20" y="-10" width="55" height="130" fill="rgba(17,24,39,0.9)" rx="6" stroke="#374151" />
                            <text x="7" y="5" textAnchor="middle" fill="#9ca3af" fontSize="9">Alt</text>
                            <rect x="0" y="15" width="14" height="90" rx="3" fill="linear-gradient(to top, #166534, #ca8a04, #dc2626)" />
                            <defs>
                                <linearGradient id="altGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                                    <stop offset="0%" stopColor="#166534" />
                                    <stop offset="50%" stopColor="#ca8a04" />
                                    <stop offset="100%" stopColor="#dc2626" />
                                </linearGradient>
                            </defs>
                            <rect x="0" y="15" width="14" height="90" rx="3" fill="url(#altGrad)" />
                            <text x="22" y="22" fill="#9ca3af" fontSize="8">65</text>
                            <text x="22" y="62" fill="#9ca3af" fontSize="8">25</text>
                            <text x="22" y="102" fill="#9ca3af" fontSize="8">0</text>
                            {drones.map(drone => (
                                <rect
                                    key={drone.id}
                                    x="-3" y={15 + 90 - (drone.position.z / 65 * 90) - 3}
                                    width="20" height="6" rx="2"
                                    fill={drone.color}
                                />
                            ))}
                        </g>
                    )}
                </svg>
            );
        };

        // State Machine Component
        const StateMachine = ({ currentMode, getModeColor }) => {
            const states = [
                { id: 'IDLE', x: 80, y: 180 },
                { id: 'ARMING', x: 200, y: 180 },
                { id: 'ARMED', x: 320, y: 180 },
                { id: 'TAKING_OFF', x: 440, y: 180 },
                { id: 'HOVERING', x: 440, y: 80 },
                { id: 'NAVIGATING', x: 560, y: 80 },
                { id: 'LANDING', x: 320, y: 280 },
                { id: 'LANDED', x: 200, y: 280 },
                { id: 'EMERGENCY', x: 560, y: 280 }
            ];

            const arrows = [
                { from: 'IDLE', to: 'ARMING' },
                { from: 'ARMING', to: 'ARMED' },
                { from: 'ARMED', to: 'TAKING_OFF' },
                { from: 'TAKING_OFF', to: 'HOVERING' },
                { from: 'HOVERING', to: 'NAVIGATING' },
                { from: 'NAVIGATING', to: 'HOVERING' },
                { from: 'HOVERING', to: 'LANDING' },
                { from: 'LANDING', to: 'LANDED' },
                { from: 'LANDED', to: 'IDLE' }
            ];

            return (
                <div style={{ height: '420px', position: 'relative' }}>
                    <svg width="100%" height="100%" viewBox="0 0 640 380">
                        <rect width="640" height="380" fill="#111827" />
                        <defs>
                            <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563" />
                            </marker>
                        </defs>

                        {arrows.map((arrow, idx) => {
                            const from = states.find(s => s.id === arrow.from);
                            const to = states.find(s => s.id === arrow.to);
                            return (
                                <line key={idx}
                                    x1={from.x + 50} y1={from.y}
                                    x2={to.x - 50} y2={to.y}
                                    stroke="#4b5563" strokeWidth="2"
                                    markerEnd="url(#arrow)"
                                />
                            );
                        })}

                        {states.map(state => (
                            <g key={state.id}>
                                <rect
                                    x={state.x - 50} y={state.y - 22}
                                    width="100" height="44" rx="8"
                                    fill={state.id === currentMode ? getModeColor(state.id) : '#374151'}
                                    stroke={state.id === currentMode ? 'white' : '#4b5563'}
                                    strokeWidth={state.id === currentMode ? 3 : 1}
                                />
                                <text x={state.x} y={state.y + 5} textAnchor="middle" fill="white" fontSize="12"
                                    fontWeight={state.id === currentMode ? 'bold' : 'normal'}>
                                    {state.id}
                                </text>
                            </g>
                        ))}

                        <text x="20" y="360" fill="#9ca3af" fontSize="12">
                            Current State: <tspan fill="white" fontWeight="bold">{currentMode}</tspan>
                        </text>
                    </svg>
                </div>
            );
        };

        ReactDOM.render(<DroneSimulationViz />, document.getElementById('root'));
    </script>
</body>
</html>
