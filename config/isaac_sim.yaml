# =============================================================================
# Project Sanjay Mk2 - Isaac Sim Bridge Configuration
# =============================================================================
#
# Defines drone-to-topic mappings and fusion parameters for the
# Isaac Sim ↔ ROS 2 bridge node.
#
# Updated: 6-drone Alpha Regiment + existing Beta support
#
# Used by: src/integration/isaac_sim_bridge.py
#          src/swarm/coordination/regiment_coordinator.py
# =============================================================================

# --- Alpha Regiment (6 Drones) ---
# Each Alpha drone operates at 65m altitude with full sensor suites:
#   - RGB camera (84° FOV) for visual surveillance
#   - Depth camera for obstacle depth fusion
#   - 3D RTX LiDAR for obstacle avoidance & SLAM
#   - IMU for attitude estimation

drones:
  alpha_0:
    type: ALPHA
    altitude: 65.0
    rgb_fov_deg: 84.0
    role: regiment_leader
    topics:
      rgb: /alpha_0/rgb/image_raw
      depth: /alpha_0/depth/image_raw
      lidar_3d: /alpha_0/lidar/points
      odom: /alpha_0/odom
      imu: /alpha_0/imu
      cmd_vel: /alpha_0/cmd_vel

  alpha_1:
    type: ALPHA
    altitude: 65.0
    rgb_fov_deg: 84.0
    role: regiment_member
    topics:
      rgb: /alpha_1/rgb/image_raw
      depth: /alpha_1/depth/image_raw
      lidar_3d: /alpha_1/lidar/points
      odom: /alpha_1/odom
      imu: /alpha_1/imu
      cmd_vel: /alpha_1/cmd_vel

  alpha_2:
    type: ALPHA
    altitude: 65.0
    rgb_fov_deg: 84.0
    role: regiment_member
    topics:
      rgb: /alpha_2/rgb/image_raw
      depth: /alpha_2/depth/image_raw
      lidar_3d: /alpha_2/lidar/points
      odom: /alpha_2/odom
      imu: /alpha_2/imu
      cmd_vel: /alpha_2/cmd_vel

  alpha_3:
    type: ALPHA
    altitude: 65.0
    rgb_fov_deg: 84.0
    role: regiment_member
    topics:
      rgb: /alpha_3/rgb/image_raw
      depth: /alpha_3/depth/image_raw
      lidar_3d: /alpha_3/lidar/points
      odom: /alpha_3/odom
      imu: /alpha_3/imu
      cmd_vel: /alpha_3/cmd_vel

  alpha_4:
    type: ALPHA
    altitude: 65.0
    rgb_fov_deg: 84.0
    role: regiment_member
    topics:
      rgb: /alpha_4/rgb/image_raw
      depth: /alpha_4/depth/image_raw
      lidar_3d: /alpha_4/lidar/points
      odom: /alpha_4/odom
      imu: /alpha_4/imu
      cmd_vel: /alpha_4/cmd_vel

  alpha_5:
    type: ALPHA
    altitude: 65.0
    rgb_fov_deg: 84.0
    role: regiment_member
    topics:
      rgb: /alpha_5/rgb/image_raw
      depth: /alpha_5/depth/image_raw
      lidar_3d: /alpha_5/lidar/points
      odom: /alpha_5/odom
      imu: /alpha_5/imu
      cmd_vel: /alpha_5/cmd_vel

  beta_0:
    type: BETA
    altitude: 25.0
    rgb_fov_deg: 50.0
    role: interceptor
    topics:
      rgb: /beta_0/rgb/image_raw
      depth: /beta_0/depth/image_raw
      odom: /beta_0/odom
      imu: /beta_0/imu
      cmd_vel: /beta_0/cmd_vel

# --- Sensor Fusion Parameters ---
fusion:
  tick_rate_hz: 10
  match_radius: 15.0
  min_change_confidence: 0.35

# --- Obstacle Avoidance Parameters ---
obstacle_avoidance:
  apf:
    detection_range: 15.0
    safe_distance: 6.0
    danger_zone: 2.5
    critical_distance: 1.0
    attractive_gain: 1.5
    repulsive_gain: 8.0
    max_avoidance_speed: 4.0
    altitude_bias: 0.4
  hpl:
    critical_distance: 1.5
    hard_stop_distance: 0.6
    escape_speed: 2.0
    num_sectors: 12
  lidar_3d:
    max_range: 30.0
    min_range: 0.3
    num_channels: 16
    scan_rate_hz: 10.0
    cluster_eps: 0.8
    cluster_min_points: 5

# --- Regiment Configuration ---
regiment:
  size: 6
  formation: HEXAGONAL
  formation_spacing: 80.0
  formation_altitude: 65.0
  total_coverage_area: 1000.0
  sector_overlap: 0.15
  cslam_share_interval: 2.0
  leader_election_interval: 10.0
  min_inter_drone_distance: 50.0

# --- Isaac Sim Scene ---
scene:
  world_width: 1000.0
  world_height: 1000.0
  cell_size: 5.0
  usd_save_path: simulation/worlds/surveillance_arena.usd

# --- ROS 2 ---
ros2:
  domain_id: 10
  qos_depth: 10
