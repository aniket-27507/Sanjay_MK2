# S02 — Building Fire
# Category: high_rise
# Tests: High thermal anomaly on structure, threat escalation

scenario:
  id: S02
  name: Building Fire
  category: high_rise
  duration_sec: 300
  description: >
    Fire breaks out on a downtown building at t=45s.
    Extremely high thermal signature (0.95) should trigger immediate detection.
    ThreatManager escalates to HIGH.
  split: train

world:
  terrain_seed: 42
  buildings:
    - center: [200, 200]
      width: 18
      depth: 18
      height: 55

spawn_schedule:
  - time: 45
    type: fire
    position: [200, 200, 30]
    is_threat: true
    thermal_signature: 0.95

crowd:
  enabled: false

faults: []

fleet:
  num_alpha: 6
  num_beta: 1
  formation_center: [500, 500]
  patrol_pattern: hexagonal

expected_events:
  - type: threat_detected
    object_type: fire
    max_latency_sec: 45

metrics:
  max_detection_latency_sec: 45
  max_false_positive_rate: 0.05
  min_coverage_pct: 80
