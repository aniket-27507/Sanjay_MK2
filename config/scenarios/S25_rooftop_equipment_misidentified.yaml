# S25 — Rooftop Equipment Misidentified
# Category: high_rise
# Tests: False positive suppression for equipment with high thermal signature

scenario:
  id: S25
  name: Rooftop Equipment Misidentified
  category: high_rise
  duration_sec: 300
  description: >
    HVAC equipment on rooftop at (200,200,50) with thermal signature
    0.82 at t=20s. Should not be classified as threat. Tests false
    positive suppression for benign rooftop equipment.
  split: train

world:
  terrain_seed: 115
  buildings:
    - center: [200, 200]
      width: 30
      depth: 30
      height: 50

spawn_schedule:
  - time: 20
    type: equipment
    position: [200, 200, 50]
    is_threat: false
    thermal_signature: 0.82

crowd:
  enabled: false

faults: []

fleet:
  num_alpha: 6
  num_beta: 1
  formation_center: [500, 500]
  patrol_pattern: building_perimeter

expected_events:
  - type: object_classified
    object_type: equipment
    max_latency_sec: 60

metrics:
  max_detection_latency_sec: 60
  max_false_positive_rate: 0.05
  min_coverage_pct: 80
