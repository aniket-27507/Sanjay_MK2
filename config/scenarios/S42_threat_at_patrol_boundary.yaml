# S42 — Threat at Extreme Patrol Boundary
# Category: edge
# Tests: Detection at maximum range from formation center

scenario:
  id: S42
  name: Threat at Extreme Patrol Boundary
  category: edge
  duration_sec: 300
  description: >
    Person threat at (50,50) far from formation center at (500,500).
    Tests detection capability at extreme patrol boundary where drone
    coverage is thinnest.
  split: test

world:
  terrain_seed: 175
  buildings: []

spawn_schedule:
  - time: 30
    type: person
    position: [50, 50, 0]
    is_threat: true
    thermal_signature: 0.85

crowd:
  enabled: false

faults: []

fleet:
  num_alpha: 6
  num_beta: 0
  formation_center: [500, 500]
  patrol_pattern: hexagonal

expected_events:
  - type: threat_detected
    object_type: person
    max_latency_sec: 120

metrics:
  max_detection_latency_sec: 120
  max_false_positive_rate: 0.05
  min_coverage_pct: 80
