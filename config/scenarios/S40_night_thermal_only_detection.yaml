# S40 — Night Thermal-Only Detection
# Category: crowd
# Tests: Thermal-only detection with RGB failed on all drones

scenario:
  id: S40
  name: Night Thermal-Only Detection
  category: crowd
  duration_sec: 300
  description: >
    Night scenario where RGB cameras fail on all drones at t=0s. Person
    with high thermal signature (0.90) appears at t=20s. Tests
    thermal-only detection capability without RGB input.
  split: test

world:
  terrain_seed: 165
  buildings: []

spawn_schedule:
  - time: 20
    type: person
    position: [400, 400, 0]
    is_threat: true
    thermal_signature: 0.90

crowd:
  enabled: false

faults:
  - time: 0
    type: rgb_degraded
    drone_id: 0
    duration: 300
  - time: 0
    type: rgb_degraded
    drone_id: 1
    duration: 300
  - time: 0
    type: rgb_degraded
    drone_id: 2
    duration: 300
  - time: 0
    type: rgb_degraded
    drone_id: 3
    duration: 300
  - time: 0
    type: rgb_degraded
    drone_id: 4
    duration: 300
  - time: 0
    type: rgb_degraded
    drone_id: 5
    duration: 300

fleet:
  num_alpha: 6
  num_beta: 1
  formation_center: [500, 500]
  patrol_pattern: hexagonal

expected_events:
  - type: threat_detected
    object_type: person
    max_latency_sec: 60

metrics:
  max_detection_latency_sec: 60
  max_false_positive_rate: 0.15
  min_coverage_pct: 70
