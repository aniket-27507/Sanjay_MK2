# S15 — Vehicle Approaching Pedestrian Zone
# Category: vehicle
# Tests: Moving vehicle detection, threat escalation for ped zone incursion

scenario:
  id: S15
  name: Vehicle Approaching Pedestrian Zone
  category: vehicle
  duration_sec: 300
  description: >
    Vehicle approaching pedestrian zone at speed at (350,450) at t=20s.
    Elevated thermal signature indicates running engine. Tests vehicle
    threat detection and rapid escalation.
  split: train

world:
  terrain_seed: 65
  buildings: []

spawn_schedule:
  - time: 20
    type: vehicle
    position: [350, 450, 0.8]
    is_threat: true
    thermal_signature: 0.80

crowd:
  enabled: false

faults: []

fleet:
  num_alpha: 6
  num_beta: 0
  formation_center: [500, 500]
  patrol_pattern: hexagonal

expected_events:
  - type: threat_detected
    object_type: vehicle
    max_latency_sec: 45
  - type: alpha_inspection_dispatched
    max_latency_sec: 75

metrics:
  max_detection_latency_sec: 45
  max_false_positive_rate: 0.05
  min_coverage_pct: 80
