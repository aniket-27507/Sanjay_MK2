# S08 — Bird Flock (False Alarm)
# Category: false_alarm
# Tests: Multiple small fast objects should NOT escalate to threats

scenario:
  id: S08
  name: Bird Flock
  category: false_alarm
  duration_sec: 240
  description: >
    A flock of 8 birds (small size, moderate thermal) passes through
    the patrol area at t=30s. System should detect but NOT escalate
    to HIGH/CRITICAL threats due to small size and low confidence.
  split: test

