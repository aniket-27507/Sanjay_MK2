# S50_cm_demo_validation — CM Demo Autonomy Validation (3 Drones, 200m Hex)
# Category: demo
# Tests: Hex sector assignment, GPS patrol, obstacle avoidance, drone failure recovery
# Environment: Urban park (Ganeshguri proxy), 10-15m altitude, obstacle-rich
#
# Demo sequence:
#   1. Auto-takeoff from deployment center to 12m
#   2. CBBA assigns 2 of 6 hex sectors per drone
#   3. GPS waypoint patrol within sectors, Boids for spacing
#   4. LiDAR obstacle avoidance when approaching trees/buildings
#   5. Drone 2 killed at t=90s -> remaining 2 re-assign to 3 sectors each
#   6. RTL at t=240s
#
# Physics: Tier 1+2 enabled (wind, GPS noise, battery, IMU, atmosphere, LiDAR noise)

scenario:
  id: S50_cm_demo_validation
  name: CM Demo Autonomy Validation
  category: baseline
  duration_sec: 300
  description: >
    3-drone validation scenario for CM Assam demo. 200m hexagonal patrol zone
    in an obstacle-rich urban park environment at 10-15m altitude. Tests
    autonomous sector assignment, patrol, obstacle avoidance, drone failure
    recovery, and RTL. Physics Tier 1+2 enabled.
  split: test

