spawn_schedule:
  # Simulated threat at t=120s for task allocation test
  - time: 120
    type: person
    position: [530, 470, 8]
    is_threat: true
    thermal_signature: 0.85

crowd:
  enabled: false

faults:
  # Kill drone 2 at t=90s to test re-assignment
  - time: 90
    drone_id: 2
    type: disable
    description: "Simulated drone failure — test sector re-assignment"

fleet:
  num_alpha: 3
  num_beta: 0
  formation_center: [446, 489]
  patrol_pattern: hexagonal
  patrol_altitude: 12.0
  formation_spacing: 30.0

# Physics configuration
physics:
  enabled: true
  altitude_m: 12
  hex_radius_m: 200
  wind:
    base_speed_ms: 6.0
    base_direction_deg: 210
    gust_max_ms: 4.0
    gust_probability_per_sec: 0.12
    turbulence_intensity: 0.25
    drone_mass_kg: 0.5
  gps:
    horizontal_sigma_m: 2.5
    multipath_extra_sigma_m: 4.0
  battery:
    capacity_mah: 2200
    cell_count: 3
  atmosphere:
    temperature_c: 33.0
    relative_humidity_pct: 88.0
    station_altitude_asl_m: 55.0

expected_events:
  - type: sector_assignment_complete
    max_latency_sec: 10
  - type: patrol_coverage_80pct
    max_latency_sec: 60
  - type: drone_failure_detected
    max_latency_sec: 5
  - type: sector_reassignment_complete
    max_latency_sec: 15
  - type: threat_detected
    max_latency_sec: 45

metrics:
  max_detection_latency_sec: 45
  max_false_positive_rate: 0.05
  min_coverage_pct: 85
  max_sector_reassignment_sec: 15
  min_obstacle_clearance_m: 2.0
  max_gps_track_error_m: 5.0
