# S24 — Window Position Shooter
# Category: high_rise
# Tests: Elevated weapon detection at building window level

scenario:
  id: S24
  name: Window Position Shooter
  category: high_rise
  duration_sec: 300
  description: >
    Armed person at elevated window position (200,200,35) at t=40s.
    Tests detection of weapon_person at building mid-height. Beta must
    maneuver to window-level altitude for confirmation.
  split: train

world:
  terrain_seed: 110
  buildings:
    - center: [200, 200]
      width: 30
      depth: 30
      height: 50

spawn_schedule:
  - time: 40
    type: weapon_person
    position: [200, 200, 35]
    is_threat: true
    thermal_signature: 0.85

crowd:
  enabled: false

faults: []

fleet:
  num_alpha: 6
  num_beta: 1
  formation_center: [500, 500]
  patrol_pattern: building_perimeter

expected_events:
  - type: threat_detected
    object_type: weapon_person
    max_latency_sec: 60
  - type: beta_dispatched
    max_latency_sec: 90

metrics:
  max_detection_latency_sec: 60
  max_false_positive_rate: 0.05
  min_coverage_pct: 80
