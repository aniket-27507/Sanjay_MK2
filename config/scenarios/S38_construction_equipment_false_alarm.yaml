# S38 — Construction Equipment as Threat
# Category: false_alarm
# Tests: False positive suppression for construction equipment

scenario:
  id: S38
  name: Construction Equipment as Threat
  category: false_alarm
  duration_sec: 300
  description: >
    Four construction equipment objects with moderate thermal signatures
    (0.65). None are threats. Tests false positive suppression for
    benign construction site objects.
  split: test

world:
  terrain_seed: 155
  buildings:
    - center: [300, 300]
      width: 40
      depth: 40
      height: 20

spawn_schedule:
  - time: 10
    type: equipment
    position: [280, 280, 0]
    is_threat: false
    thermal_signature: 0.65
  - time: 12
    type: equipment
    position: [320, 280, 0]
    is_threat: false
    thermal_signature: 0.65
  - time: 14
    type: equipment
    position: [280, 320, 0]
    is_threat: false
    thermal_signature: 0.65
  - time: 16
    type: equipment
    position: [320, 320, 0]
    is_threat: false
    thermal_signature: 0.65

crowd:
  enabled: false

faults: []

fleet:
  num_alpha: 6
  num_beta: 0
  formation_center: [500, 500]
  patrol_pattern: hexagonal

expected_events:
  - type: object_classified
    object_type: equipment
    max_latency_sec: 60

metrics:
  max_detection_latency_sec: 60
  max_false_positive_rate: 0.05
  min_coverage_pct: 80
