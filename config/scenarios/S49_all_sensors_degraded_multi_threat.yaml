# S49 — All Sensors Degraded + Multi-Threat
# Category: stress
# Tests: Detection under severe sensor degradation with active threats

scenario:
  id: S49
  name: All Sensors Degraded Plus Multi-Threat
  category: stress
  duration_sec: 300
  description: >
    RGB intermittent on even drones (0,2,4), thermal failed on odd
    drones (1,3,5). Weapon_person at t=40s and fire at t=60s. Tests
    detection capability under maximum sensor degradation.
  split: test

world:
  terrain_seed: 210
  buildings: []

spawn_schedule:
  - time: 40
    type: weapon_person
    position: [400, 400, 0]
    is_threat: true
    thermal_signature: 0.85
  - time: 60
    type: fire
    position: [600, 600, 0]
    is_threat: true
    thermal_signature: 0.95

crowd:
  enabled: false

faults:
  - time: 10
    type: rgb_intermittent
    drone_id: 0
    duration: 290
  - time: 10
    type: rgb_intermittent
    drone_id: 2
    duration: 290
  - time: 10
    type: rgb_intermittent
    drone_id: 4
    duration: 290
  - time: 10
    type: thermal_failed
    drone_id: 1
    duration: 290
  - time: 10
    type: thermal_failed
    drone_id: 3
    duration: 290
  - time: 10
    type: thermal_failed
    drone_id: 5
    duration: 290

fleet:
  num_alpha: 6
  num_beta: 0
  formation_center: [500, 500]
  patrol_pattern: hexagonal

expected_events:
  - type: threat_detected
    object_type: weapon_person
    max_latency_sec: 90
  - type: threat_detected
    object_type: fire
    max_latency_sec: 90

metrics:
  max_detection_latency_sec: 90
  max_false_positive_rate: 0.15
  min_coverage_pct: 60
