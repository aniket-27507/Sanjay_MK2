# S45 — Person Hiding in Vegetation
# Category: edge
# Tests: Low thermal signature detection in vegetated area

scenario:
  id: S45
  name: Person Hiding in Vegetation
  category: edge
  duration_sec: 300
  description: >
    Person hiding in forest/vegetation zone at (150,600) with reduced
    thermal signature (0.60) due to foliage cover. Tests detection
    sensitivity for partially occluded low-thermal targets.
  split: test

world:
  terrain_seed: 190
  buildings: []

spawn_schedule:
  - time: 30
    type: person
    position: [150, 600, 0]
    is_threat: true
    thermal_signature: 0.60

crowd:
  enabled: false

faults: []

fleet:
  num_alpha: 6
  num_beta: 0
  formation_center: [500, 500]
  patrol_pattern: hexagonal

expected_events:
  - type: threat_detected
    object_type: person
    max_latency_sec: 90

metrics:
  max_detection_latency_sec: 90
  max_false_positive_rate: 0.10
  min_coverage_pct: 80
