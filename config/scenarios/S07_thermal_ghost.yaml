# S07 — Thermal Ghost (False Alarm)
# Category: false_alarm
# Tests: Hot equipment detected then CLEARED after confirmation

scenario:
  id: S07
  name: Thermal Ghost
  category: false_alarm
  duration_sec: 300
  description: >
    Industrial equipment with high thermal signature (0.75) spawns at t=20s.
    Alpha detects as thermal_contact. Beta dispatched for confirmation.
    Beta close-up reveals it's equipment → threat CLEARED.
  split: test

world:
  terrain_seed: 42
  buildings: []

spawn_schedule:
  - time: 20
    type: equipment
    position: [510, 160, 2.0]
    is_threat: false
    thermal_signature: 0.75

crowd:
  enabled: false

faults: []

fleet:
  num_alpha: 6
  num_beta: 1
  formation_center: [500, 500]
  patrol_pattern: hexagonal

expected_events:
  - type: threat_detected
    object_type: equipment
    max_latency_sec: 60
  - type: threat_cleared
    max_latency_sec: 180

metrics:
  max_detection_latency_sec: 60
  max_false_positive_rate: 1.0
  min_coverage_pct: 80
