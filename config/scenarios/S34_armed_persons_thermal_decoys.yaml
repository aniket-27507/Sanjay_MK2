# S34 — Two Armed Persons + Thermal Decoys
# Category: multi
# Tests: Threat discrimination among high-thermal objects, decoy rejection

scenario:
  id: S34
  name: Two Armed Persons Plus Thermal Decoys
  category: multi
  duration_sec: 300
  description: >
    Two weapon_persons and three equipment decoys with high thermal
    signatures (0.80). Tests ability to distinguish real weapon threats
    from benign high-thermal equipment objects.
  split: train

world:
  terrain_seed: 135
  buildings: []

spawn_schedule:
  - time: 30
    type: weapon_person
    position: [350, 350, 0]
    is_threat: true
    thermal_signature: 0.85
  - time: 35
    type: weapon_person
    position: [650, 650, 0]
    is_threat: true
    thermal_signature: 0.85
  - time: 20
    type: equipment
    position: [300, 600, 0]
    is_threat: false
    thermal_signature: 0.80
  - time: 22
    type: equipment
    position: [500, 300, 0]
    is_threat: false
    thermal_signature: 0.80
  - time: 25
    type: equipment
    position: [700, 400, 0]
    is_threat: false
    thermal_signature: 0.80

crowd:
  enabled: false

faults: []

fleet:
  num_alpha: 6
  num_beta: 1
  formation_center: [500, 500]
  patrol_pattern: hexagonal

expected_events:
  - type: threat_detected
    object_type: weapon_person
    max_latency_sec: 60
  - type: object_classified
    object_type: equipment
    max_latency_sec: 60

metrics:
  max_detection_latency_sec: 60
  max_false_positive_rate: 0.10
  min_coverage_pct: 80
