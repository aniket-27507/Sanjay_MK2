# =============================================================================
# Development Override for Mac Engineers
# =============================================================================
#
# Adds dev tools and binds source code for live editing.
# This file extends docker-compose.yml with development-specific settings.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# =============================================================================

services:
  # =======================================================================
  # Autonomy 1 - Development Mode
  # =======================================================================
  autonomy-1:
    profiles:
      - dev
    volumes:
      # Bind mount source code for live editing
      # Changes to source code are reflected immediately
      - ./src/autonomy:/workspace/src/autonomy
    environment:
      - DEV_MODE=true
      - ROS_ENABLE_TRACING=1
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        source /workspace/devel/setup.bash 2>/dev/null || true &&
        echo 'Starting autonomy node in dev mode...' &&
        ros2 run autonomy control_node
      "

  # =======================================================================
  # Autonomy 2 - Development Mode
  # =======================================================================
  autonomy-2:
    profiles:
      - dev
    volumes:
      - ./src/planning:/workspace/src/planning
    environment:
      - DEV_MODE=true
      - ROS_ENABLE_TRACING=1
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        source /workspace/devel/setup.bash 2>/dev/null || true &&
        echo 'Starting planning node in dev mode...' &&
        ros2 run planning planner_node
      "

  # =======================================================================
  # Development Tools Container
  # =======================================================================
  #
  # This container stays running with a shell so you can exec into it
  # and run ROS 2 commands interactively.
  #
  # Usage:
  #   docker exec -it dev-tools bash
  #   source /opt/ros/humble/setup.bash
  #   ros2 topic list
  #
  dev-tools:
    image: osrf/ros:humble-tools
    container_name: dev-tools
    profiles:
      - dev
    environment:
      - ROS_DOMAIN_ID=10
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTRTPS_DEFAULT_PROFILES_FILE=/opt/config/fastdds_profiles.xml
      - ROS_LOCALHOST_ONLY=0
      - DEV_MODE=true
    volumes:
      # Fast DDS profile
      - ./network/fastdds_profiles.xml:/opt/config/fastdds_profiles.xml:ro
      # Source code
      - ./src:/workspace/src
      # SSH keys for git
      - ~/.ssh:/root/.ssh:ro
    network_mode: host
    command: tail -f /dev/null
